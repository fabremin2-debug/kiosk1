const diffMins = (sd,st,ed,et) => {
  if (!sd||!st||!ed||!et) return 0;
  const d = Math.round((new Date(`${ed}T${et}`) - new Date(`${sd}T${st}`)) / 60000);
  return d > 0 ? d : 0;
};
const diffDays = (sd,ed) => {
  if (!sd||!ed) return 0;
  const d = Math.ceil((new Date(ed) - new Date(sd)) / 86400000);
  return d > 0 ? d : 0;
};

const calcFee = (eq, mins, days, mq, rq, qty) => {
  if (!eq) return 0;
  let base = 0;
  if (eq.type==="cage") base = ((parseInt(mq)||0)*500 + (parseInt(rq)||0)*600) * (days||1);
  else if (eq.unit==="L")   base = (parseInt(qty)||0) * eq.fee;
  else if (eq.unit==="Day") base = (days||1) * eq.fee;
  else                      base = Math.ceil((mins||0)/60) * eq.fee;
  return Math.round(base * 1.1);
};

function ReservationPage({onBack}){
  const [ec,setEc]=React.useState("");
  const [co,setCo]=React.useState(""); const [cu,setCu]=React.useState("");
  const [wo,setWo]=React.useState("");
  const maxDate = new Date(Date.now()+21*86400000).toISOString().slice(0,10);
  const [sdt,setSdt]=React.useState(todayStr());
  const [edt,setEdt]=React.useState("");
  const [done,setDone]=React.useState(false);
  const [reservations,setReservations]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [calMonth,setCalMonth]=React.useState(new Date());

  React.useEffect(()=>{
    if(!ec) return;
    setLoading(true);
    const eqName=EQUIPMENT.find(e=>e.code===ec)?.name||"";
    // JSONP 방식으로 CORS 우회
    const cbName="cb_"+Date.now();
    const script=document.createElement("script");
    script.src=SCRIPT_URL+"?action=getReservations&장비명="+encodeURIComponent(eqName)+"&callback="+cbName;
    window[cbName]=(data)=>{
      if(data.result==="success") setReservations(data.data||[]);
      delete window[cbName];
      document.body.removeChild(script);
      setLoading(false);
    };
    script.onerror=()=>{ setLoading(false); delete window[cbName]; };
    document.body.appendChild(script);
  },[ec]);

  const eq=EQUIPMENT.find(e=>e.code===ec);
  const cn=co==="직접입력"?cu:co;
  const days=diffDays(sdt,edt)||1;
  const valid=cn&&wo&&ec&&sdt&&edt;

  // 예약된 날짜 범위 계산
  const bookedDates = React.useMemo(()=>{
    const set=new Set();
    reservations.filter(r=>ec&&r.장비명===eq?.name).forEach(r=>{
      if(!r.예약시작일||!r.예약종료일) return;
      let cur=new Date(r.예약시작일);
      const end=new Date(r.예약종료일);
      while(cur<=end){ set.add(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
    });
    return set;
  },[reservations,ec]);

  const isBooked=d=>bookedDates.has(d);
  const isInMyRange=d=>sdt&&edt&&d>=sdt&&d<=edt;

  // 달력 렌더
  const renderCalendar=()=>{
    const year=calMonth.getFullYear(), month=calMonth.getMonth();
    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const today=todayStr();
    const cells=[];
    for(let i=0;i<firstDay;i++) cells.push(<div key={`e${i}`}/>);
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const past=ds<today, over=ds>maxDate;
      const booked=isBooked(ds), mine=isInMyRange(ds);
      const disabled=past||over||booked;
      let bg="transparent", color=C.text, border="none";
      if(booked) { bg="#991b1b"; color="#fca5a5"; }
      else if(ds===sdt&&!edt) { bg="#0ea5e9"; color="#fff"; border="2px solid #38bdf8"; }
      else if(mine) { bg="#1d4ed8"; color="#fff"; }
      else if(past||over) { color=C.faint; }
      cells.push(
        <div key={ds} onClick={()=>{
          if(disabled) return;
          if(!sdt||!edt){ 
            if(!sdt){ setSdt(ds); }
            else if(!edt){ ds<sdt?setSdt(ds):setEdt(ds); }
          } else { setSdt(ds); setEdt(""); }
        }} style={{
          textAlign:"center",padding:"6px 2px",borderRadius:6,
          background:bg,color,fontSize:13,cursor:disabled?"not-allowed":"pointer",
          opacity:disabled?0.4:1,border,fontWeight:mine?"700":"400"
        }}>{d}</div>
      );
    }
    return cells;
  };

  const submit=async()=>{
    const r={연도:new Date(sdt).getFullYear(),날짜:new Date(sdt).toLocaleDateString("ko-KR"),업체명:cn,담당자:wo,장비명:eq?.name,장비코드:ec,부과단위:"Day",예약시작일:sdt,예약종료일:edt,예약일수:`${days}일`,구분:"예약"};
    try{await fetch(SCRIPT_URL+"?"+new URLSearchParams(r).toString(),{method:"GET",mode:"no-cors"});}catch(e){}
    setDone(true);
  };

  if(done) return <DonePage onBack={onBack} rows={[["업체명",cn],["장비명",eq?.name],["예약 시작일",sdt],["예약 종료일",edt],["예약 일수",`${days}일`]]}/>;

  return(
    <div>
      <SecT c="📅 고속액체크로마토그래프 장비예약"/>
      <CompanyWorker co={co} setCo={setCo} cu={cu} setCu={setCu} wo={wo} setWo={setWo}/>
      <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>장비 선택</div>
      <select value={ec} onChange={e=>{setEc(e.target.value);setSdt(todayStr());setEdt("");}} style={S.sel}>
        <option value="">선택하세요</option>
        {EQUIPMENT.filter(e=>e.name.includes("고속액체크로마토그래프")).map(e=><option key={e.code} value={e.code}>{e.name}</option>)}
      </select>

      {ec&&(
        <div>
          {/* 달력 */}
          <div style={{background:C.inputBg,borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${C.border}`}}>
            {/* 달력 헤더 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setCalMonth(new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1))} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer"}}>‹</button>
              <span style={{color:C.text,fontWeight:600,fontSize:14}}>{calMonth.getFullYear()}년 {calMonth.getMonth()+1}월</span>
              <button onClick={()=>setCalMonth(new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1))} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer"}}>›</button>
            </div>
            {/* 요일 */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
              {["일","월","화","수","목","금","토"].map(d=><div key={d} style={{textAlign:"center",color:C.faint,fontSize:11}}>{d}</div>)}
            </div>
            {/* 날짜 */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
              {loading?<div style={{gridColumn:"1/-1",textAlign:"center",color:C.muted,padding:10,fontSize:12}}>예약 현황 불러오는 중...</div>:renderCalendar()}
            </div>
            {/* 범례 */}
            <div style={{display:"flex",gap:12,marginTop:10}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:"#991b1b"}}/><span style={{color:C.faint,fontSize:10}}>예약됨</span></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:"#1d4ed8"}}/><span style={{color:C.faint,fontSize:10}}>내 선택</span></div>
            </div>
          </div>

          {/* 안내 */}
          <div style={{color:C.faint,fontSize:11,marginBottom:12,textAlign:"center"}}>
            달력에서 시작일 → 종료일 순으로 탭하거나 직접 입력하세요
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>예약 시작일 <span style={{color:"#f87171"}}>*</span></div>
              <input type="date" value={sdt} onChange={e=>{setSdt(e.target.value);setEdt("");}} min={todayStr()} max={maxDate} style={S.inp}/>
            </div>
            <div>
              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>예약 종료일 <span style={{color:"#f87171"}}>*</span></div>
              <input type="date" value={edt} onChange={e=>setEdt(e.target.value)} min={sdt||todayStr()} max={maxDate} style={S.inp}/>
            </div>
          </div>

          {sdt&&edt&&<div style={{background:C.inputBg,borderRadius:12,padding:"14px 16px",marginBottom:20,border:"1px solid #1e3a5f"}}>
            <Row l="예약 기간" v={`${sdt} ~ ${edt}`} sub/>
            <Row l="예약 일수" v={`${days}일`} sub/>
          </div>}
        </div>
      )}

      <div style={{display:"flex",gap:8}}><GBtn label="← 뒤로" onClick={onBack}/><PBtn label="예약하기" onClick={submit} disabled={!valid}/></div>
    </div>
  );
}

// ── 메인 ──
function App(){
  const [step,setStep]=React.useState("home");

  const [eq,setEq]=React.useState(null);
  const [co,setCo]=React.useState(""); const [cu,setCu]=React.useState("");
  const [wo,setWo]=React.useState("");

  const [sST,setSST]=React.useState(""); // startTime
  const [eST,setEST]=React.useState(""); // endTime
  const [qty,setQty]=React.useState("");
  // 장기/챔버 공통
  const [sDate,setSDate]=React.useState(todayStr());
  const [sTime,setSTime]=React.useState("");
  const [eDate,setEDate]=React.useState("");
  const [eTime,setETime]=React.useState("");
  const [mouseQ,setMouseQ]=React.useState("");
  const [ratQ,setRatQ]=React.useState("");
  const [records,setRecords]=React.useState([]);

  const cn=co==="직접입력"?cu:co;
  const isL=eq?.unit==="L";
  const isDay=eq?.unit==="Day";

  // 단기 계산
  const shMins=()=>diffMins(todayStr(),sST,todayStr(),eST);
  const shFee=()=>calcFee(eq,shMins(),1,0,0,qty);
  const shValid=cn&&wo&&eq&&(isL?parseInt(qty)>0:isDay?true:shMins()>0);

  // 장기 계산 - 종료 미정 가능
  const lgMins=()=>diffMins(sDate,sTime,eDate||sDate,eTime||"23:59");
  const lgFee=()=>eDate&&eTime?calcFee(eq,lgMins(),1,0,0,0):0;
  const lgValid=cn&&wo&&eq&&sDate&&sTime;

  // 챔버 계산 - 종료 미정 가능
  const cgDays=()=>eDate?Math.max(diffDays(sDate,eDate),1):null;

  const submitLong=()=>post({연도:new Date(sDate).getFullYear(),날짜:new Date(sDate).toLocaleDateString("ko-KR"),업체명:cn,담당자:wo,장비명:eq.name,장비코드:eq.code,부과단위:eq.unit,사용시작일:sDate,사용시작시간:sTime,사용종료일:eDate||"미정",사용종료시간:eTime||"미정",사용시간_분:eDate&&eTime?lgMins():"미정",단가:eq.fee,수수료:eDate&&eTime?lgFee():"미정",구분:"이용"});

  const submitCage=()=>post({연도:new Date(sDate).getFullYear(),날짜:new Date(sDate).toLocaleDateString("ko-KR"),업체명:cn,담당자:wo,장비명:eq.name,장비코드:eq.code,부과단위:"Cage/Day",사용시작일:sDate,사용종료일:eDate||"미정",사용일수:eDate?cgDays():"미정",마우스수:m,랫수:r,단가_마우스:500,단가_랫:600,수수료:eDate?cgFee():"미정",구분:"이용"});

  const reset=()=>{setStep("home");setEq(null);setEqSearch("");setCo("");setCu("");setWo("");setSST("");setEST("");setQty("");setSDate(todayStr());setSTime("");setEDate("");setETime("");setMouseQ("");setRatQ("");};

    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>

        <div style={{background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,padding:"20px 28px"}}>
          <div style={{fontSize:11,color:"#bae6fd",letterSpacing:2,marginBottom:4}}>춘천바이오산업진흥원</div>
          <div style={{fontSize:20,fontWeight:700,color:"#fff"}}>공유장비 이용 기록 시스템</div>
          <div style={{fontSize:11,color:"#7dd3fc",marginTop:4}}>{toKoDate()}</div>
        </div>

        <div style={{padding:"24px 24px 28px"}}>
          {step==="qr"&&<QRPage onBack={()=>setStep("home")}/>}

              <div style={{color:C.muted,fontSize:13,marginBottom:20}}>아래 버튼을 눌러 이용 기록을 입력해주세요</div>
              <button onClick={()=>setStep("equipment")} style={{width:"100%",padding:15,background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:10}}>이용 기록 입력</button>
              <button onClick={()=>setStep("reservation")} style={{width:"100%",padding:13,background:"linear-gradient(135deg,#0369a1,#0ea5e9)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:10}}>📅 고속액체크로마토그래프 장비예약</button>

                  <div style={{display:"flex",gap:6}}><input type="time" value={sTime} onChange={e=>setSTime(e.target.value)} style={{...S.inp,marginBottom:0,flex:1}}/><button onClick={()=>setSTime(nowStr())} style={{padding:"0 8px",borderRadius:8,background:"#1e3a5f",border:"none",color:"#7dd3fc",fontSize:11,cursor:"pointer",marginBottom:14}}>지금</button></div>

                  <div style={{display:"flex",gap:6}}><input type="time" value={eTime} onChange={e=>setETime(e.target.value)} style={{...S.inp,marginBottom:0,flex:1}}/><button onClick={()=>setETime(nowStr())} style={{padding:"0 8px",borderRadius:8,background:"#1e3a5f",border:"none",color:"#7dd3fc",fontSize:11,cursor:"pointer",marginBottom:14}}>지금</button></div>

            </div>
          )}

          {/* 폼: 챔버 */}
          {step==="form"&&eq?.type==="cage"&&(
            <div>
              <EqBadge eq={eq}/>
              <SecT c="② 이용 정보 입력"/>
              <CompanyWorker co={co} setCo={setCo} cu={cu} setCu={setCu} wo={wo} setWo={setWo}/>
              <InfoBox msg={"📌 동물사육챔버입니다.\n• 시작 날짜와 마리 수는 반드시 입력해주세요.\n• 종료 날짜는 사용 종료 후 입력하거나 지금 입력할 수 있습니다.\n• 종료일 미입력 시 '미정'으로 저장되며, 종료 후 다시 기록해주세요."}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>시작 날짜 <span style={{color:"#f87171"}}>*</span></div><input type="date" value={sDate} onChange={e=>setSDate(e.target.value)} style={S.inp}/></div>
                <div><div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>종료 날짜 <span style={{color:C.faint}}>(선택)</span></div><input type="date" value={eDate} onChange={e=>setEDate(e.target.value)} style={S.inp}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>마우스 수 <span style={{color:C.faint,fontSize:10}}>(500원/마리/일)</span></div><input type="number" min="0" value={mouseQ} onChange={e=>setMouseQ(e.target.value)} placeholder="0" style={S.inp}/></div>
                <div><div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>랫 수 <span style={{color:C.faint,fontSize:10}}>(600원/마리/일)</span></div><input type="number" min="0" value={ratQ} onChange={e=>setRatQ(e.target.value)} placeholder="0" style={S.inp}/></div>
              </div>
              {cgValid&&<div style={{background:C.inputBg,borderRadius:12,padding:"14px 16px",marginBottom:20,border:"1px solid #1e3a5f"}}>
                {eDate
                  ?<><Row l="사용일수" v={`${cgDays()}일`} sub/><Row l="마우스 비용" v={`${(m*500*cgDays()).toLocaleString()}원`} sub/><Row l="랫 비용" v={`${(r*600*cgDays()).toLocaleString()}원`} sub/><Div/><Row l="장비 수수료(부가세 포함)" v={`${cgFee().toLocaleString()}원`} highlight/></>
                  :<Row l="수수료" v="종료 날짜 입력 후 확정" highlight/>
                }
              </div>}
              <div style={{display:"flex",gap:8}}><GBtn label="← 재선택" onClick={()=>setStep("equipment")}/><PBtn label="확인 →" onClick={()=>setStep("confirm")} disabled={!cgValid}/></div>
            </div>
          )}

          {/* 확인 */}
          {step==="confirm"&&eq&&(
            <div>
              <SecT c="③ 내용을 확인해주세요"/>
              <div style={{background:C.inputBg,borderRadius:14,padding:18,marginBottom:20}}>
                <Row l="업체명" v={cn}/><Row l="담당자" v={wo}/><Row l="장비명" v={eq.name}/>
                {eq.type==="short"&&<>
                  {!isL&&<><Row l="시작시간" v={sST}/><Row l="종료시간" v={eST}/><Row l="사용시간" v={`${Math.floor(shMins()/60)}시간 ${shMins()%60}분`} sub/></>}
                  {isL&&<Row l="사용량" v={`${qty}L`}/>}
                  <Div/><Row l="장비 수수료(부가세 포함)" v={`${shFee().toLocaleString()}원`} highlight/>
                </>}
                {eq.type==="long"&&<>
                  <Row l="시작" v={`${sDate} ${sTime}`}/>
                  <Row l="종료" v={eDate&&eTime?`${eDate} ${eTime}`:"미정"}/>
                  {eDate&&eTime&&<Row l="사용시간" v={`${Math.floor(lgMins()/60)}시간 ${lgMins()%60}분`} sub/>}
                  <Div/><Row l="장비 수수료(부가세 포함)" v={eDate&&eTime?`${lgFee().toLocaleString()}원`:"미정"} highlight/>
                </>}
                {eq.type==="cage"&&<>
                  <Row l="시작일" v={sDate}/><Row l="종료일" v={eDate||"미정"}/>
                  {eDate&&<Row l="사용일수" v={`${cgDays()}일`} sub/>}
                  <Row l="마우스" v={`${m}마리`}/><Row l="랫" v={`${r}마리`}/>
                  <Div/><Row l="장비 수수료(부가세 포함)" v={eDate?`${cgFee().toLocaleString()}원`:"미정"} highlight/>
                </>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <GBtn label="← 수정" onClick={()=>setStep("form")}/>
                <PBtn green label="제출하기 ✓" onClick={eq.type==="short"?submitShort:eq.type==="long"?submitLong:submitCage}/>
              </div>
            </div>
          )}

          {step==="sending"&&<div style={{textAlign:"center",padding:"20px 0"}}><div style={{fontSize:40,marginBottom:16}}>⏳</div><div style={{color:C.text,fontSize:17,fontWeight:600}}>구글 시트에 저장 중...</div></div>}

          {step==="done"&&last&&(
            <div style={{textAlign:"center"}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#059669,#10b981)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:32}}>✓</div>
              <div style={{color:C.text,fontSize:19,fontWeight:700,marginBottom:6}}>기록 완료!</div>
              <div style={{color:C.muted,fontSize:13,marginBottom:24}}>구글 시트에 저장되었습니다</div>
              <div style={{background:C.inputBg,borderRadius:12,padding:16,marginBottom:20,textAlign:"left"}}>
                <Row l="업체명" v={last.업체명}/><Row l="장비명" v={last.장비명}/>
                <Row l="장비 수수료(부가세 포함)" v={typeof last.수수료==="number"?`${last.수수료.toLocaleString()}원`:"미정"} highlight/>
              </div>
              <button onClick={reset} style={{width:"100%",padding:15,background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>처음으로</button>
            </div>
          )}

          {step==="records"&&(
            <div>
              <SecT c={`오늘 기록 (${records.length}건)`}/>
              <div style={{maxHeight:340,overflowY:"auto",marginBottom:16}}>
                {records.map((rec,i)=>(
                  <div key={i} style={{background:C.inputBg,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:C.text,fontWeight:600,fontSize:13}}>{rec.장비명}</span>
                      <span style={{color:C.primary,fontWeight:700,fontSize:13}}>{typeof rec.수수료==="number"?`${rec.수수료.toLocaleString()}원`:"미정"}</span>
                    </div>
                    <div style={{color:C.muted,fontSize:12}}>{rec.업체명} · {rec.담당자}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#0c2a3f",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.muted,fontSize:13}}>합계(부가세 포함)</span>
                <span style={{color:C.primary,fontWeight:700}}>{records.filter(r=>typeof r.수수료==="number").reduce((s,r)=>s+r.수수료,0).toLocaleString()}원</span>
              </div>
              <GBtn label="← 홈으로" onClick={()=>setStep("home")}/>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
