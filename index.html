const toKoDate = () => new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
const diffMins = (sd,st,ed,et) => { if(!sd||!st||!ed||!et) return 0; const d=Math.round((new Date(`${ed}T${et}`)-new Date(`${sd}T${st}`))/60000); return d>0?d:0; };
const diffDays = (sd,ed) => { if(!sd||!ed) return 0; const d=Math.ceil((new Date(ed)-new Date(sd))/86400000); return d>0?d:0; };
const calcFee  = (eq,mins,days,mq,rq,qty) => {
  if(!eq) return 0;
  let base=0;
  if(eq.type==="cage") base=((parseInt(mq)||0)*500+(parseInt(rq)||0)*600)*(days||1);
  else if(eq.unit==="L") base=(parseInt(qty)||0)*eq.fee;
  else if(eq.unit==="Day") base=(days||1)*eq.fee;
  else base=Math.ceil((mins||0)/60)*eq.fee;
  return Math.round(base*1.1);
};

function AutoComplete({value,onChange,suggestions}){
  const [show,setShow]=React.useState(false);
  const filtered=React.useMemo(()=>value?suggestions.filter(s=>s!=="직접입력"&&s.replace(/[㈜㈔()（）]/g,"").toLowerCase().includes(value.replace(/[㈜㈔()（）]/g,"").toLowerCase())).slice(0,6):[],[value,suggestions]);
  return(
    <div style={{position:"relative",marginBottom:14}}>
      <input value={value} onChange={e=>{onChange(e.target.value);setShow(true);}} onBlur={()=>setTimeout(()=>setShow(false),150)} onFocus={()=>value&&setShow(true)} placeholder="업체명 입력 (일부만 입력하면 목록 표시)" style={{...IS,marginBottom:0}}/>
      {show&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1.5px solid #94a3b8",borderRadius:10,zIndex:200,boxShadow:"0 4px 16px rgba(0,0,0,0.1)",maxHeight:180,overflowY:"auto"}}>
          {filtered.map(s=>(
            <div key={s} onMouseDown={()=>{onChange(s);setShow(false);}} style={{padding:"10px 14px",cursor:"pointer",fontSize:13,color:"#0f172a",borderBottom:"1px solid #f1f5f9"}}>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ReservationPage({onBack}){
  const [ec,setEc]=React.useState("");
  const [co,setCo]=React.useState(""); const [cu,setCu]=React.useState("");
  const [wo,setWo]=React.useState(""); const [ph,setPh]=React.useState("");
  const [sdt,setSdt]=React.useState(todayStr()); const [edt,setEdt]=React.useState("");
  const [done,setDone]=React.useState(false);
  const [reservations,setReservations]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [calMonth,setCalMonth]=React.useState(new Date());
  const maxDate=new Date(Date.now()+21*86400000).toISOString().slice(0,10);

  React.useEffect(()=>{
    if(!ec) return;
    setLoading(true); setReservations([]);
    const eqName=EQUIPMENT.find(e=>e.code===ec)?.name||"";
    const cbName="cb_"+Date.now();
    const s=document.createElement("script");
    s.src=SCRIPT_URL+"?action=getReservations&장비명="+encodeURIComponent(eqName)+"&callback="+cbName;
    window[cbName]=(data)=>{ if(data.result==="success") setReservations(data.data||[]); delete window[cbName]; document.body.removeChild(s); setLoading(false); };
    s.onerror=()=>{ setLoading(false); delete window[cbName]; };
    document.body.appendChild(s);
  },[ec]);

  const eq=EQUIPMENT.find(e=>e.code===ec);
  const cn=co==="직접입력"?cu:co;
  const days=Math.max(diffDays(sdt,edt),1);
  const valid=cn&&wo&&ec&&sdt&&edt;

  const bookedDates=React.useMemo(()=>{
    const set=new Set();
    reservations.forEach(r=>{
      if(!r.예약시작일||!r.예약종료일) return;
      let cur=new Date(r.예약시작일); const end=new Date(r.예약종료일);
      while(cur<=end){set.add(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
    });
    return set;
  },[reservations]);

  const renderCal=()=>{
    const year=calMonth.getFullYear(), month=calMonth.getMonth();
    const first=new Date(year,month,1).getDay();
    const dim=new Date(year,month+1,0).getDate();
    const today=todayStr();
    const cells=[];
    for(let i=0;i<first;i++) cells.push(<div key={"e"+i}/>);
    for(let d=1;d<=dim;d++){
      const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const past=ds<today, over=ds>maxDate, booked=bookedDates.has(ds);
      const inRange=sdt&&edt&&ds>=sdt&&ds<=edt&&!booked;
      const isStart=ds===sdt&&!edt;
      const disabled=past||over||booked;
      let bg="transparent", color=past||over?"#cbd5e1":"#0f172a", fw="400";
      if(booked){bg="#fee2e2";color="#ef4444";}
      else if(inRange||isStart){bg="#dbeafe";color="#1d4ed8";fw="600";}
      cells.push(
        <div key={ds} onClick={()=>{
          if(disabled) return;
          if(!sdt||edt){setSdt(ds);setEdt("");}
          else if(!edt){ds<sdt?setSdt(ds):setEdt(ds);}
        }} style={{textAlign:"center",padding:"6px 2px",borderRadius:6,background:bg,color,fontSize:13,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,fontWeight:fw}}>
          {d}
        </div>
      );
    }
    return cells;
  };

  const submit=async()=>{
    const r={연도:new Date(sdt).getFullYear(),날짜:new Date(sdt).toLocaleDateString("ko-KR"),업체명:cn,담당자:wo,휴대폰:ph,장비명:eq?.name,장비코드:ec,부과단위:"Day",예약시작일:sdt,예약종료일:edt,예약일수:days+"일",구분:"예약"};
    try{await fetch(SCRIPT_URL+"?"+new URLSearchParams(r).toString(),{method:"GET",mode:"no-cors"});}catch(e){}
    setDone(true);
  };

  if(done) return <DonePage onBack={onBack} rows={[["업체명",cn],["장비명",eq?.name],["예약 시작일",sdt],["예약 종료일",edt],["예약 일수",days+"일"]]}/>;
  return(
    <div>
      <SecT c="📅 고속액체크로마토그래프 장비예약"/>
      <CompanyWorker co={co} setCo={setCo} cu={cu} setCu={setCu} wo={wo} setWo={setWo} ph={ph} setPh={setPh}/>
      <Lbl>장비 선택</Lbl>
      <select value={ec} onChange={e=>{setEc(e.target.value);setSdt(todayStr());setEdt("");}} style={IS}>
        <option value="">선택하세요</option>
        {EQUIPMENT.filter(e=>e.name.includes("고속액체크로마토그래프")).map(e=><option key={e.code} value={e.code}>{e.name}</option>)}
      </select>
      {ec&&(<>
        <div style={{background:"#f8fafc",borderRadius:12,padding:14,marginBottom:14,border:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={()=>setCalMonth(new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1))} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>‹</button>
            <span style={{color:"#0f172a",fontWeight:600,fontSize:14}}>{calMonth.getFullYear()}년 {calMonth.getMonth()+1}월</span>
            <button onClick={()=>setCalMonth(new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1))} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
            {["일","월","화","수","목","금","토"].map(d=><div key={d} style={{textAlign:"center",color:"#94a3b8",fontSize:11}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {loading?<div style={{gridColumn:"1/-1",textAlign:"center",color:"#94a3b8",padding:10,fontSize:12}}>불러오는 중...</div>:renderCal()}
          </div>
          <div style={{display:"flex",gap:12,marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:"#fee2e2",border:"1px solid #fca5a5"}}/><span style={{color:"#64748b",fontSize:10}}>예약됨</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:"#dbeafe"}}/><span style={{color:"#64748b",fontSize:10}}>내 선택</span></div>
          </div>
        </div>
        <div style={{color:"#94a3b8",fontSize:11,marginBottom:12,textAlign:"center"}}>달력에서 시작일 → 종료일 순으로 탭하거나 직접 입력하세요</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Lbl>예약 시작일 <span style={{color:"#ef4444"}}>*</span></Lbl><input type="date" value={sdt} onChange={e=>{setSdt(e.target.value);setEdt("");}} min={todayStr()} max={maxDate} style={IS}/></div>
          <div><Lbl>예약 종료일 <span style={{color:"#ef4444"}}>*</span></Lbl><input type="date" value={edt} onChange={e=>setEdt(e.target.value)} min={sdt||todayStr()} max={maxDate} style={IS}/></div>
        </div>
        {sdt&&edt&&<div style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #e2e8f0",marginBottom:0}}><Row l="예약 기간" v={`${sdt} ~ ${edt}`} sub/><Row l="예약 일수" v={days+"일"} sub/></div>}
      </>)}
      <div style={{display:"flex",gap:8,marginTop:16}}><GBtn label="← 뒤로" onClick={onBack}/><PBtn label="예약하기" onClick={submit} disabled={!valid}/></div>
    </div>
  );
}

                </>}
                <div><Lbl>종료 날짜 <span style={{color:endOnly?"#ef4444":"#94a3b8",fontWeight:endOnly?600:400}}>{endOnly?"*":"(선택)"}</span></Lbl><input type="date" value={eDate} onChange={e=>setEDate(e.target.value)} style={{...IS,marginBottom:0}}/></div>
                <div><Lbl>종료 시간 <span style={{color:endOnly?"#ef4444":"#94a3b8",fontWeight:endOnly?600:400}}>{endOnly?"*":"(선택)"}</span></Lbl><div style={{display:"flex",gap:6}}><input type="time" value={eTime} onChange={e=>setETime(e.target.value)} style={{...IS,marginBottom:0,flex:1}}/><NowBtn onClick={()=>setETime(nowStr())}/></div></div>
              </div>
              <div style={{height:14}}/>
              {lgValid&&<div style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #e2e8f0",marginBottom:0}}>
                {eDate&&eTime?<><Row l="실제 사용시간" v={`${Math.floor(lgMins()/60)}시간 ${lgMins()%60}분`} sub/><Div/><Row l="장비 수수료(부가세 포함)" v={`${lgFee().toLocaleString()}원`} highlight/></>:<Row l="수수료" v="종료 시간 입력 후 확정" highlight/>}
              </div>}
              <div style={{display:"flex",gap:8,marginTop:16}}><GBtn label="← 재선택" onClick={()=>setStep("equipment")}/><PBtn label="확인 →" onClick={()=>setStep("confirm")} disabled={!lgValid}/></div>
            </div>
          )}

          {/* 폼: 챔버 */}
          {step==="form"&&eq?.type==="cage"&&(
            <div>
              <EqBadge eq={eq}/>
              <SecT c="② 이용 정보 입력"/>
              <CompanyWorker co={co} setCo={setCo} cu={cu} setCu={setCu} wo={wo} setWo={setWo} ph={ph} setPh={setPh}/>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <button onClick={()=>setEndOnly(false)} style={{flex:1,padding:"9px",borderRadius:8,border:`1.5px solid ${!endOnly?"#2563eb":"#e2e8f0"}`,background:!endOnly?"#eff6ff":"#fff",color:!endOnly?"#1d4ed8":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>입실 기록</button>
                <button onClick={()=>setEndOnly(true)} style={{flex:1,padding:"9px",borderRadius:8,border:`1.5px solid ${endOnly?"#16a34a":"#e2e8f0"}`,background:endOnly?"#f0fdf4":"#fff",color:endOnly?"#16a34a":"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>퇴실 기록</button>
              </div>
              <InfoBox msg={endOnly?"📌 퇴실 기록입니다.\n종료 날짜와 마리 수를 입력해주세요.":"📌 입실 기록입니다.\n시작 날짜와 마리 수를 반드시 입력해주세요."}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><Lbl>시작 날짜 <span style={{color:endOnly?"#94a3b8":"#ef4444",fontWeight:endOnly?400:600}}>{endOnly?"(선택)":"*"}</span></Lbl><input type="date" value={sDate} onChange={e=>setSDate(e.target.value)} style={IS}/></div>
                <div><Lbl>종료 날짜 <span style={{color:endOnly?"#ef4444":"#94a3b8",fontWeight:endOnly?600:400}}>{endOnly?"*":"(선택)"}</span></Lbl><input type="date" value={eDate} onChange={e=>setEDate(e.target.value)} style={IS}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><Lbl>마우스 수 <span style={{color:"#94a3b8",fontWeight:400,fontSize:10}}>(500원/마리/일)</span></Lbl><input type="number" min="0" value={mouseQ} onChange={e=>setMouseQ(e.target.value)} placeholder="0" style={IS}/></div>
                <div><Lbl>랫 수 <span style={{color:"#94a3b8",fontWeight:400,fontSize:10}}>(600원/마리/일)</span></Lbl><input type="number" min="0" value={ratQ} onChange={e=>setRatQ(e.target.value)} placeholder="0" style={IS}/></div>
              </div>
              {cgValid&&<div style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #e2e8f0",marginBottom:0}}>
                {eDate?<><Row l="사용일수" v={`${cgDays()}일`} sub/><Row l="마우스 비용" v={`${(m*500*(cgDays()||0)).toLocaleString()}원`} sub/><Row l="랫 비용" v={`${(r*600*(cgDays()||0)).toLocaleString()}원`} sub/><Div/><Row l="장비 수수료(부가세 포함)" v={`${cgFee().toLocaleString()}원`} highlight/></>:<Row l="수수료" v="종료 날짜 입력 후 확정" highlight/>}
              </div>}
              <div style={{display:"flex",gap:8,marginTop:16}}><GBtn label="← 재선택" onClick={()=>setStep("equipment")}/><PBtn label="확인 →" onClick={()=>setStep("confirm")} disabled={!cgValid}/></div>
            </div>
          )}

          {/* 확인 */}
          {step==="confirm"&&eq&&(
            <div>
              <SecT c="③ 내용을 확인해주세요"/>
              <div style={{background:"#f8fafc",borderRadius:14,padding:18,marginBottom:20,border:"1px solid #e2e8f0"}}>
                <Row l="업체명" v={cn}/><Row l="담당자" v={wo}/>{ph&&<Row l="휴대폰" v={ph}/>}<Row l="장비명" v={eq.name}/>
                {eq.type==="short"&&<>
                  {!isL&&<><Row l="시작시간" v={sST}/><Row l="종료시간" v={eST}/><Row l="사용시간" v={`${Math.floor(shMins()/60)}시간 ${shMins()%60}분`} sub/></>}
                  {isL&&<Row l="사용량" v={`${qty}L`}/>}
                  <Div/><Row l="장비 수수료(부가세 포함)" v={`${shFee().toLocaleString()}원`} highlight/>
                </>}
                {eq.type==="long"&&<>
                  {!endOnly&&<><Row l="시작" v={`${sDate} ${sTime}`}/></>}
                  <Row l="종료" v={eDate&&eTime?`${eDate} ${eTime}`:"미정"}/>
                  {eDate&&eTime&&<Row l="사용시간" v={`${Math.floor(lgMins()/60)}시간 ${lgMins()%60}분`} sub/>}
                  <Div/><Row l="장비 수수료(부가세 포함)" v={eDate&&eTime?`${lgFee().toLocaleString()}원`:"미정"} highlight/>
                </>}
                {eq.type==="cage"&&<>
                  {!endOnly&&<Row l="시작일" v={sDate}/>}
                  <Row l="종료일" v={eDate||"미정"}/>{eDate&&<Row l="사용일수" v={`${cgDays()}일`} sub/>}
                  <Row l="마우스" v={`${m}마리`}/><Row l="랫" v={`${r}마리`}/>
                  <Div/><Row l="장비 수수료(부가세 포함)" v={eDate?`${cgFee().toLocaleString()}원`:"미정"} highlight/>
                </>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <GBtn label="← 수정" onClick={()=>setStep("form")}/>
                <PBtn green label={submitting?"저장 중...":"제출하기 ✓"} onClick={eq.type==="short"?submitShort:eq.type==="long"?submitLong:submitCage} disabled={submitting}/>
              </div>
            </div>
          )}

          {step==="sending"&&<div style={{textAlign:"center",padding:"20px 0"}}><div style={{fontSize:36,marginBottom:16}}>⏳</div><div style={{color:"#0f172a",fontSize:16,fontWeight:600}}>구글 시트에 저장 중...</div></div>}

          {step==="done"&&last&&(
            <div style={{textAlign:"center"}}>
              <div style={{width:64,height:64,borderRadius:"50%",background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:28}}>✓</div>
              <div style={{color:"#0f172a",fontSize:18,fontWeight:700,marginBottom:4}}>기록 완료!</div>
              <div style={{color:"#64748b",fontSize:13,marginBottom:24}}>구글 시트에 저장되었습니다</div>
              <div style={{background:"#f8fafc",borderRadius:12,padding:16,marginBottom:20,textAlign:"left",border:"1px solid #e2e8f0"}}>
                <Row l="업체명" v={last.업체명}/><Row l="장비명" v={last.장비명}/>
                <Row l="장비 수수료(부가세 포함)" v={typeof last.수수료==="number"?`${last.수수료.toLocaleString()}원`:"미정"} highlight/>
              </div>
              <button onClick={reset} style={{width:"100%",padding:13,background:"#2563eb",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer"}}>처음으로</button>
            </div>
          )}

          {step==="records"&&(
            <div>
              <SecT c={`오늘 기록 (${records.length}건)`}/>
              <div style={{maxHeight:340,overflowY:"auto",marginBottom:16}}>
                {records.map((rec,i)=>(
                  <div key={i} style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #e2e8f0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:"#0f172a",fontWeight:600,fontSize:13}}>{rec.장비명}</span>
                      <span style={{color:"#2563eb",fontWeight:700,fontSize:13}}>{typeof rec.수수료==="number"?`${rec.수수료.toLocaleString()}원`:"미정"}</span>
                    </div>
                    <div style={{color:"#64748b",fontSize:12}}>{rec.업체명} · {rec.담당자}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#eff6ff",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",border:"1px solid #bfdbfe"}}>
                <span style={{color:"#64748b",fontSize:13}}>합계(부가세 포함)</span>
                <span style={{color:"#2563eb",fontWeight:700}}>{records.filter(r=>typeof r.수수료==="number").reduce((s,r)=>s+r.수수료,0).toLocaleString()}원</span>
              </div>
              <GBtn label="← 홈으로" onClick={()=>setStep("home")}/>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
