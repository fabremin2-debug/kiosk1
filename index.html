<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>공유장비 이용 기록 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; font-family: 'Segoe UI', sans-serif; }
  select, input { -webkit-appearance: none; appearance: none; }
  input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const EQUIPMENT = [
  { name: "고속냉장원심분리기", code: "A-01", fee: 800 },
  { name: "고속액체크로마토그래피-12", code: "B-01", fee: 5500 },
  { name: "고속액체크로마토그래피-13", code: "B-02", fee: 5500 },
  { name: "고속액체크로마토그래피-14", code: "B-03", fee: 5500 },
  { name: "초소수처조기-1", code: "C-01", fee: 500 },
  { name: "초소수처조기-2", code: "C-02", fee: 500 },
  { name: "항온습동통사육장치-3", code: "D-01", fee: 500 },
  { name: "항온습동통사육장치-4", code: "D-02", fee: 500 },
  { name: "동결건조기", code: "E-01", fee: 1200 },
  { name: "PCR", code: "F-01", fee: 1000 },
];

const COMPANIES = [
  "(주)레이포유바이오시스테크",
  "(주)바이오셀릭스",
  "(주)다이셀",
  "베롤머",
  "(주)바이오텍",
  "(주)뉴바이오옵텍",
  "(주)뉴핸드케어",
  "(주)뉴사바이오텍",
  "직접입력",
];

const C = {
  bg: "#0f172a", card: "#1e293b", border: "#334155",
  primary: "#0ea5e9", primaryDark: "#1d4ed8",
  text: "#e2e8f0", muted: "#94a3b8", faint: "#64748b",
  success: "#10b981", inputBg: "#0f172a",
};

const today = () => new Date().toLocaleDateString("ko-KR", {
  year: "numeric", month: "long", day: "numeric", weekday: "short"
});

const nowStr = () => new Date().toTimeString().slice(0, 5);

function Row({ label, value, highlight }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
      <span style={{ color:C.faint, fontSize:13 }}>{label}</span>
      <span style={{ color: highlight ? C.primary : C.text, fontWeight: highlight ? 700 : 500, fontSize:13 }}>{value}</span>
    </div>
  );
}

function Btn({ children, onClick, color }) {
  const bg = color === "green"
    ? "linear-gradient(135deg,#059669,#10b981)"
    : `linear-gradient(135deg,${C.primaryDark},${C.primary})`;
  return (
    <button onClick={onClick} style={{
      width:"100%", padding:"15px", background:bg,
      color:"#fff", border:"none", borderRadius:12,
      fontSize:15, fontWeight:700, cursor:"pointer"
    }}>{children}</button>
  );
}

function GhostBtn({ children, onClick }) {
  return (
    <button onClick={onClick} style={{
      width:"100%", padding:"12px", background:"none",
      border:`1px solid ${C.border}`, color:C.muted,
      borderRadius:12, fontSize:14, cursor:"pointer"
    }}>{children}</button>
  );
}

function Label({ children, mt }) {
  return (
    <div style={{ color:C.muted, fontSize:12, fontWeight:600, marginBottom:6, marginTop: mt||0 }}>
      {children}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ color:"#7dd3fc", fontSize:12, fontWeight:700, letterSpacing:1, marginBottom:14 }}>
      {children}
    </div>
  );
}

const selStyle = {
  width:"100%", padding:"11px 12px", borderRadius:10,
  background:C.inputBg, border:`2px solid ${C.border}`,
  color:C.text, fontSize:13, marginBottom:14, outline:"none"
};

const inpStyle = {
  width:"100%", padding:"11px 12px", borderRadius:10,
  background:C.inputBg, border:`2px solid ${C.border}`,
  color:C.text, fontSize:13, marginBottom:14, outline:"none"
};

function App() {
  const [step, setStep] = React.useState("home");
  const [selectedEq, setSelectedEq] = React.useState(null);
  const [company, setCompany] = React.useState("");
  const [customCompany, setCustomCompany] = React.useState("");
  const [worker, setWorker] = React.useState("");
  const [usageHour, setUsageHour] = React.useState("");
  const [usageMin, setUsageMin] = React.useState("");
  const [startTime, setStartTime] = React.useState("");
  const [endTime, setEndTime] = React.useState("");
  const [records, setRecords] = React.useState([]);

  const companyName = company === "직접입력" ? customCompany : company;
  const totalMins = () => (parseInt(usageHour)||0)*60 + (parseInt(usageMin)||0);
  const calcFee = () => selectedEq ? Math.ceil((totalMins()/60)*selectedEq.fee) : 0;
  const formValid = companyName && worker && selectedEq && totalMins() > 0;

  const handleSubmit = () => {
    const record = {
      날짜: new Date().toLocaleDateString("ko-KR"),
      업체명: companyName, 담당자: worker,
      장비명: selectedEq.name, 장비코드: selectedEq.code,
      사용시작: startTime, 사용종료: endTime,
      사용시간_분: totalMins(),
      환산시간: (totalMins()/60).toFixed(4),
      단가: selectedEq.fee, 수수료: calcFee(),
    };
    setRecords(prev => [...prev, record]);
    setStep("done");
  };

  const reset = () => {
    setStep("home"); setSelectedEq(null);
    setCompany(""); setCustomCompany(""); setWorker("");
    setUsageHour(""); setUsageMin(""); setStartTime(""); setEndTime("");
  };

  const minsLabel = () => {
    const m = totalMins();
    return `${Math.floor(m/60)>0 ? Math.floor(m/60)+"시간 " : ""}${m%60>0 ? m%60+"분" : ""}`;
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:500, background:C.card, borderRadius:24, boxShadow:"0 25px 60px rgba(0,0,0,0.5)", overflow:"hidden" }}>

        {/* 헤더 */}
        <div style={{ background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`, padding:"20px 28px" }}>
          <div style={{ fontSize:11, color:"#bae6fd", letterSpacing:2, marginBottom:4 }}>춘천바이오산업진흥원</div>
          <div style={{ fontSize:20, fontWeight:700, color:"#fff" }}>공유장비 이용 기록 시스템</div>
          <div style={{ fontSize:11, color:"#7dd3fc", marginTop:4 }}>{today()}</div>
        </div>

        <div style={{ padding:"24px 24px 28px" }}>

          {/* HOME */}
          {step === "home" && (
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:52, marginBottom:16 }}>🔬</div>
              <div style={{ color:C.text, fontSize:17, fontWeight:600, marginBottom:8 }}>장비 이용을 시작하시겠습니까?</div>
              <div style={{ color:C.muted, fontSize:13, marginBottom:28 }}>아래 버튼을 눌러 이용 기록을 입력해주세요</div>
              <Btn onClick={() => setStep("equipment")}>이용 기록 입력 시작</Btn>
              {records.length > 0 && (
                <button onClick={() => setStep("records")} style={{
                  marginTop:12, background:"none", border:`1px solid ${C.border}`,
                  color:C.muted, borderRadius:10, padding:"10px 20px",
                  cursor:"pointer", fontSize:13, width:"100%"
                }}>오늘 기록 보기 ({records.length}건)</button>
              )}
            </div>
          )}

          {/* 장비 선택 */}
          {step === "equipment" && (
            <div>
              <SectionTitle>① 장비를 선택하세요</SectionTitle>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:20 }}>
                {EQUIPMENT.map(eq => (
                  <button key={eq.code} onClick={() => { setSelectedEq(eq); setStep("form"); }} style={{
                    padding:"14px 10px", borderRadius:12,
                    border:`2px solid ${C.border}`, background:C.inputBg,
                    color:C.text, cursor:"pointer", textAlign:"left"
                  }}>
                    <div style={{ fontSize:12, fontWeight:600, marginBottom:4 }}>{eq.name}</div>
                    <div style={{ fontSize:11, color:C.muted }}>{eq.code}</div>
                    <div style={{ fontSize:12, color:C.primary, marginTop:4 }}>{eq.fee.toLocaleString()}원/h</div>
                  </button>
                ))}
              </div>
              <GhostBtn onClick={() => setStep("home")}>← 뒤로</GhostBtn>
            </div>
          )}

          {/* 입력 폼 */}
          {step === "form" && selectedEq && (
            <div>
              <div style={{ background:"#0c2a3f", border:`1px solid ${C.primary}`, borderRadius:12, padding:"12px 16px", marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ color:C.primary, fontSize:11, marginBottom:2 }}>선택된 장비</div>
                  <div style={{ color:C.text, fontWeight:700, fontSize:15 }}>{selectedEq.name}</div>
                </div>
                <div style={{ color:C.primary, fontSize:13, fontWeight:600 }}>{selectedEq.fee.toLocaleString()}원/h</div>
              </div>

              <SectionTitle>② 이용 정보를 입력하세요</SectionTitle>

              <Label>업체명</Label>
              <select value={company} onChange={e => setCompany(e.target.value)} style={selStyle}>
                <option value="">선택하세요</option>
                {COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              {company === "직접입력" && (
                <input value={customCompany} onChange={e => setCustomCompany(e.target.value)}
                  placeholder="업체명 직접 입력" style={inpStyle} />
              )}

              <Label>담당자명</Label>
              <input value={worker} onChange={e => setWorker(e.target.value)}
                placeholder="성함을 입력하세요" style={inpStyle} />

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div>
                  <Label>시작 시간</Label>
                  <div style={{ display:"flex", gap:6 }}>
                    <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
                      style={{ ...inpStyle, marginBottom:0, flex:1 }} />
                    <button onClick={() => setStartTime(nowStr())} style={{ padding:"0 8px", borderRadius:8, background:"#1e3a5f", border:"none", color:"#7dd3fc", fontSize:11, cursor:"pointer", marginBottom:14 }}>지금</button>
                  </div>
                </div>
                <div>
                  <Label>종료 시간</Label>
                  <div style={{ display:"flex", gap:6 }}>
                    <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                      style={{ ...inpStyle, marginBottom:0, flex:1 }} />
                    <button onClick={() => setEndTime(nowStr())} style={{ padding:"0 8px", borderRadius:8, background:"#1e3a5f", border:"none", color:"#7dd3fc", fontSize:11, cursor:"pointer", marginBottom:14 }}>지금</button>
                  </div>
                </div>
              </div>

              <Label mt={4}>사용 시간</Label>
              <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:16 }}>
                <input type="number" min="0" value={usageHour} onChange={e => setUsageHour(e.target.value)}
                  placeholder="0" style={{ ...inpStyle, marginBottom:0, width:70, textAlign:"center" }} />
                <span style={{ color:C.muted, fontSize:13 }}>시간</span>
                <input type="number" min="0" max="59" value={usageMin} onChange={e => setUsageMin(e.target.value)}
                  placeholder="0" style={{ ...inpStyle, marginBottom:0, width:70, textAlign:"center" }} />
                <span style={{ color:C.muted, fontSize:13 }}>분</span>
              </div>

              {totalMins() > 0 && (
                <div style={{ background:C.inputBg, borderRadius:12, padding:"14px 16px", marginBottom:20, border:"1px solid #1e3a5f" }}>
                  <Row label="사용시간" value={minsLabel()} />
                  <Row label="환산시간" value={`${(totalMins()/60).toFixed(4)}h`} />
                  <Row label="장비 수수료" value={`${calcFee().toLocaleString()}원`} highlight />
                </div>
              )}

              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setStep("equipment")} style={{
                  flex:1, padding:"12px", background:"none",
                  border:`1px solid ${C.border}`, color:C.muted,
                  borderRadius:12, fontSize:13, cursor:"pointer"
                }}>← 장비 재선택</button>
                <button disabled={!formValid} onClick={() => setStep("confirm")} style={{
                  flex:2, padding:"14px", borderRadius:12,
                  background: formValid ? `linear-gradient(135deg,${C.primaryDark},${C.primary})` : C.border,
                  color: formValid ? "#fff" : C.faint,
                  border:"none", fontSize:15, fontWeight:700,
                  cursor: formValid ? "pointer" : "not-allowed"
                }}>확인 →</button>
              </div>
            </div>
          )}

          {/* 확인 */}
          {step === "confirm" && (
            <div>
              <SectionTitle>③ 내용을 확인해주세요</SectionTitle>
              <div style={{ background:C.inputBg, borderRadius:14, padding:"18px", marginBottom:20 }}>
                {[
                  ["업체명", companyName], ["담당자", worker],
                  ["장비명", selectedEq?.name], ["장비코드", selectedEq?.code],
                  ["시작시간", startTime||"-"], ["종료시간", endTime||"-"],
                  ["사용시간", minsLabel()],
                  ["환산시간", `${(totalMins()/60).toFixed(4)}h`],
                  ["장비 수수료", `${calcFee().toLocaleString()}원`],
                ].map(([k,v]) => <Row key={k} label={k} value={v} highlight={k==="장비 수수료"} />)}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setStep("form")} style={{
                  flex:1, padding:"12px", background:"none",
                  border:`1px solid ${C.border}`, color:C.muted,
                  borderRadius:12, fontSize:13, cursor:"pointer"
                }}>← 수정</button>
                <button onClick={handleSubmit} style={{
                  flex:2, padding:"14px", borderRadius:12,
                  background:"linear-gradient(135deg,#059669,#10b981)",
                  color:"#fff", border:"none", fontSize:15, fontWeight:700, cursor:"pointer"
                }}>제출하기 ✓</button>
              </div>
            </div>
          )}

          {/* 완료 */}
          {step === "done" && (
            <div style={{ textAlign:"center" }}>
              <div style={{ width:72, height:72, borderRadius:"50%", background:"linear-gradient(135deg,#059669,#10b981)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", fontSize:32 }}>✓</div>
              <div style={{ color:C.text, fontSize:19, fontWeight:700, marginBottom:6 }}>기록 완료!</div>
              <div style={{ color:C.muted, fontSize:13, marginBottom:24 }}>이용 기록이 저장되었습니다</div>
              <div style={{ background:C.inputBg, borderRadius:12, padding:"16px", marginBottom:20, textAlign:"left" }}>
                <Row label="업체명" value={companyName} />
                <Row label="장비명" value={selectedEq?.name} />
                <Row label="사용시간" value={`${(totalMins()/60).toFixed(4)}h`} />
                <Row label="장비 수수료" value={`${calcFee().toLocaleString()}원`} highlight />
              </div>
              <Btn onClick={reset}>처음으로</Btn>
            </div>
          )}

          {/* 기록 목록 */}
          {step === "records" && (
            <div>
              <SectionTitle>오늘 기록 ({records.length}건)</SectionTitle>
              <div style={{ maxHeight:340, overflowY:"auto", marginBottom:16 }}>
                {records.map((r,i) => (
                  <div key={i} style={{ background:C.inputBg, borderRadius:10, padding:"12px 14px", marginBottom:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                      <span style={{ color:C.text, fontWeight:600, fontSize:13 }}>{r.장비명}</span>
                      <span style={{ color:C.primary, fontWeight:700, fontSize:13 }}>{r.수수료.toLocaleString()}원</span>
                    </div>
                    <div style={{ color:C.muted, fontSize:12 }}>{r.업체명} · {r.담당자} · {r.환산시간}h</div>
                  </div>
                ))}
              </div>
              <div style={{ background:"#0c2a3f", borderRadius:10, padding:"12px 14px", marginBottom:16, display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:C.muted, fontSize:13 }}>합계</span>
                <span style={{ color:C.primary, fontWeight:700 }}>{records.reduce((s,r)=>s+r.수수료,0).toLocaleString()}원</span>
              </div>
              <GhostBtn onClick={() => setStep("home")}>← 홈으로</GhostBtn>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
