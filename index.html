    if (!start || !end) return 0;
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    const diff = (eh * 60 + em) - (sh * 60 + sm);
    return diff > 0 ? diff : 0;
  };

  const totalMins = () => {
    const fromTime = calcMinsFromTime(startTime, endTime);
    if (fromTime > 0) return fromTime;
    return (parseInt(usageHour)||0)*60+(parseInt(usageMin)||0);

  const handleSubmit = async () => {
    const record = {
      연도: new Date().getFullYear(),
      날짜: new Date().toLocaleDateString("ko-KR"),
      업체명: companyName, 담당자: worker,
      장비명: selectedEq.name, 장비코드: selectedEq.code,
      사용시작: startTime, 사용종료: endTime,
      사용시간_분: totalMins(),
      환산시간: (totalMins()/60).toFixed(4),
      단가: selectedEq.fee, 수수료: calcFee()
    };
    setRecords(prev => [...prev, record]);
    setStep("sending");
    try {
      const params = new URLSearchParams({
        연도: record.연도,
        날짜: record.날짜,
        업체명: record.업체명,
        담당자: record.담당자,
        장비명: record.장비명,
        장비코드: record.장비코드,
        사용시작: record.사용시작,
        사용종료: record.사용종료,
        사용시간_분: record.사용시간_분,
        환산시간: record.환산시간,
        단가: record.단가,
        수수료: record.수수료
      });
      await fetch(SCRIPT_URL + "?" + params.toString(), {
        method: "GET",
        mode: "no-cors"
      });
      setStep("done");
    } catch(err) {
      setStep("done");
    }
  };

  const reset=()=>{
    setStep("home");setSelectedEq(null);setEqSearch("");
    setCompany("");setCustomCompany("");setWorker("");
    setUsageHour("");setUsageMin("");setStartTime("");setEndTime("");
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:520,background:C.card,borderRadius:24,boxShadow:"0 25px 60px rgba(0,0,0,0.5)",overflow:"hidden"}}>

        {/* 헤더 */}
        <div style={{background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,padding:"20px 28px"}}>
          <div style={{fontSize:11,color:"#bae6fd",letterSpacing:2,marginBottom:4}}>춘천바이오산업진흥원</div>
          <div style={{fontSize:20,fontWeight:700,color:"#fff"}}>공유장비 이용 기록 시스템</div>
          <div style={{fontSize:11,color:"#7dd3fc",marginTop:4}}>{today()}</div>
        </div>

        <div style={{padding:"24px 24px 28px"}}>

          {/* HOME */}
          {step==="home"&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:16}}>🔬</div>
              <div style={{color:C.text,fontSize:17,fontWeight:600,marginBottom:8}}>장비 이용을 시작하시겠습니까?</div>
              <div style={{color:C.muted,fontSize:13,marginBottom:28}}>아래 버튼을 눌러 이용 기록을 입력해주세요</div>
              <button onClick={()=>setStep("equipment")} style={{width:"100%",padding:"15px",background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                이용 기록 입력 시작
              </button>
              {records.length>0&&(
                <button onClick={()=>setStep("records")} style={{marginTop:12,background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:"10px 20px",cursor:"pointer",fontSize:13,width:"100%"}}>
                  오늘 기록 보기 ({records.length}건)
                </button>
              )}
            </div>
          )}

          {/* 장비 선택 */}
          {step==="equipment"&&(
            <div>
              <div style={{color:"#7dd3fc",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>① 장비를 선택하세요</div>
              <input value={eqSearch} onChange={e=>setEqSearch(e.target.value)}
                placeholder="🔍 장비명 또는 코드 검색"
                style={{...inpStyle,marginBottom:12}} />
              <div style={{maxHeight:360,overflowY:"auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {filteredEq.map(eq=>(
                  <button key={eq.code} onClick={()=>{setSelectedEq(eq);setStep("form");}} style={{
                    padding:"12px 10px",borderRadius:12,
                    border:`2px solid ${C.border}`,background:C.inputBg,
                    color:C.text,cursor:"pointer",textAlign:"left"
                  }}>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:3,lineHeight:1.3}}>{eq.name}</div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{eq.code}</div>
                    <div style={{fontSize:12,color:C.primary}}>{eq.fee.toLocaleString()}원/h</div>
                  </button>
                ))}
                {filteredEq.length===0&&<div style={{color:C.muted,fontSize:13,padding:"20px 0",gridColumn:"1/-1",textAlign:"center"}}>검색 결과 없음</div>}
              </div>
              <button onClick={()=>setStep("home")} style={{width:"100%",padding:"12px",background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:12,fontSize:14,cursor:"pointer"}}>← 뒤로</button>
            </div>
          )}

          {/* 입력 폼 */}
          {step==="form"&&selectedEq&&(
            <div>
              <div style={{background:"#0c2a3f",border:`1px solid ${C.primary}`,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:C.primary,fontSize:11,marginBottom:2}}>선택된 장비</div>
                  <div style={{color:C.text,fontWeight:700,fontSize:14}}>{selectedEq.name}</div>
                  <div style={{color:C.muted,fontSize:11,marginTop:2}}>{selectedEq.code}</div>
                </div>
                <div style={{color:C.primary,fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{selectedEq.fee.toLocaleString()}원/h</div>
              </div>

              <div style={{color:"#7dd3fc",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>② 이용 정보 입력</div>

              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>업체명</div>
              <select value={company} onChange={e=>setCompany(e.target.value)} style={selStyle}>
                <option value="">선택하세요</option>
                {COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              {company==="직접입력"&&(
                <input value={customCompany} onChange={e=>setCustomCompany(e.target.value)} placeholder="업체명 직접 입력" style={inpStyle}/>
              )}

              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>담당자명</div>
              <input value={worker} onChange={e=>setWorker(e.target.value)} placeholder="성함을 입력하세요" style={inpStyle}/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>시작 시간</div>
                  <div style={{display:"flex",gap:6}}>
                    <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} style={{...inpStyle,marginBottom:0,flex:1}}/>
                    <button onClick={()=>setStartTime(nowStr())} style={{padding:"0 8px",borderRadius:8,background:"#1e3a5f",border:"none",color:"#7dd3fc",fontSize:11,cursor:"pointer",marginBottom:14}}>지금</button>
                  </div>
                </div>
                <div>
                  <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6}}>종료 시간</div>
                  <div style={{display:"flex",gap:6}}>
                    <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} style={{...inpStyle,marginBottom:0,flex:1}}/>
                    <button onClick={()=>setEndTime(nowStr())} style={{padding:"0 8px",borderRadius:8,background:"#1e3a5f",border:"none",color:"#7dd3fc",fontSize:11,cursor:"pointer",marginBottom:14}}>지금</button>
                  </div>
                </div>
              </div>

              <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:6,marginTop:4}}>사용 시간</div>
              {calcMinsFromTime(startTime, endTime) > 0 ? (
                <div style={{background:"#0c2a3f",border:`1px solid ${C.primary}`,borderRadius:10,padding:"11px 14px",marginBottom:14,color:C.primary,fontWeight:600,fontSize:14}}>
                  ⏱ 자동 계산: {Math.floor(calcMinsFromTime(startTime,endTime)/60)>0?Math.floor(calcMinsFromTime(startTime,endTime)/60)+"시간 ":""}{calcMinsFromTime(startTime,endTime)%60>0?calcMinsFromTime(startTime,endTime)%60+"분":""}
                </div>
              ) : (
                <div>
                  <div style={{color:C.faint,fontSize:11,marginBottom:8}}>시작/종료 시간 입력 시 자동 계산 · 직접 입력도 가능</div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
                    <input type="number" min="0" value={usageHour} onChange={e=>setUsageHour(e.target.value)} placeholder="0" style={{...inpStyle,marginBottom:0,width:70,textAlign:"center"}}/>
                    <span style={{color:C.muted,fontSize:13}}>시간</span>
                    <input type="number" min="0" max="59" value={usageMin} onChange={e=>setUsageMin(e.target.value)} placeholder="0" style={{...inpStyle,marginBottom:0,width:70,textAlign:"center"}}/>
                    <span style={{color:C.muted,fontSize:13}}>분</span>
                  </div>
                </div>
              )}

              {totalMins()>0&&(
                <div style={{background:C.inputBg,borderRadius:12,padding:"14px 16px",marginBottom:20,border:"1px solid #1e3a5f"}}>
                  <Row label="사용시간" value={minsLabel()}/>
                  <Row label="환산시간" value={`${(totalMins()/60).toFixed(4)}h`}/>
                  <Row label="내부 수수료" value={`${calcFee().toLocaleString()}원`} highlight/>
                </div>
              )}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep("equipment")} style={{flex:1,padding:"12px",background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:12,fontSize:13,cursor:"pointer"}}>← 재선택</button>
                <button disabled={!formValid} onClick={()=>setStep("confirm")} style={{flex:2,padding:"14px",borderRadius:12,background:formValid?`linear-gradient(135deg,${C.primaryDark},${C.primary})`:C.border,color:formValid?"#fff":C.faint,border:"none",fontSize:15,fontWeight:700,cursor:formValid?"pointer":"not-allowed"}}>확인 →</button>
              </div>
            </div>
          )}

          {/* 확인 */}
          {step==="confirm"&&(
            <div>
              <div style={{color:"#7dd3fc",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>③ 내용을 확인해주세요</div>
              <div style={{background:C.inputBg,borderRadius:14,padding:"18px",marginBottom:20}}>
                {[
                  ["업체명",companyName],["담당자",worker],
                  ["장비명",selectedEq?.name],["장비코드",selectedEq?.code],
                  ["시작시간",startTime||"-"],["종료시간",endTime||"-"],
                  ["사용시간",minsLabel()],
                  ["환산시간",`${(totalMins()/60).toFixed(4)}h`],
                  ["내부 수수료",`${calcFee().toLocaleString()}원`],
                ].map(([k,v])=><Row key={k} label={k} value={v} highlight={k==="내부 수수료"}/>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setStep("form")} style={{flex:1,padding:"12px",background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:12,fontSize:13,cursor:"pointer"}}>← 수정</button>
                <button onClick={handleSubmit} style={{flex:2,padding:"14px",borderRadius:12,background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",border:"none",fontSize:15,fontWeight:700,cursor:"pointer"}}>제출하기 ✓</button>
              </div>
            </div>
          )}

          {/* 전송 중 */}
          {step==="sending"&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:40,marginBottom:16}}>⏳</div>
              <div style={{color:C.text,fontSize:17,fontWeight:600,marginBottom:8}}>구글 시트에 저장 중...</div>
              <div style={{color:C.muted,fontSize:13}}>잠시만 기다려주세요</div>
            </div>
          )}

          {/* 완료 */}
          {step==="done"&&(
            <div style={{textAlign:"center"}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#059669,#10b981)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:32}}>✓</div>
              <div style={{color:C.text,fontSize:19,fontWeight:700,marginBottom:6}}>기록 완료!</div>
              <div style={{color:C.muted,fontSize:13,marginBottom:24}}>이용 기록이 저장되었습니다</div>
              <div style={{background:C.inputBg,borderRadius:12,padding:"16px",marginBottom:20,textAlign:"left"}}>
                <Row label="업체명" value={companyName}/>
                <Row label="장비명" value={selectedEq?.name}/>
                <Row label="사용시간" value={`${(totalMins()/60).toFixed(4)}h`}/>
                <Row label="내부 수수료" value={`${calcFee().toLocaleString()}원`} highlight/>
              </div>
              <button onClick={reset} style={{width:"100%",padding:"15px",background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>처음으로</button>
            </div>
          )}

          {/* 기록 목록 */}
          {step==="records"&&(
            <div>
              <div style={{color:"#7dd3fc",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>오늘 기록 ({records.length}건)</div>
              <div style={{maxHeight:340,overflowY:"auto",marginBottom:16}}>
                {records.map((r,i)=>(
                  <div key={i} style={{background:C.inputBg,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{color:C.text,fontWeight:600,fontSize:13}}>{r.장비명}</span>
                      <span style={{color:C.primary,fontWeight:700,fontSize:13}}>{r.수수료.toLocaleString()}원</span>
                    </div>
                    <div style={{color:C.muted,fontSize:12}}>{r.업체명} · {r.담당자} · {r.환산시간}h</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#0c2a3f",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.muted,fontSize:13}}>합계</span>
                <span style={{color:C.primary,fontWeight:700}}>{records.reduce((s,r)=>s+r.수수료,0).toLocaleString()}원</span>
              </div>
              <button onClick={()=>setStep("home")} style={{width:"100%",padding:"12px",background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:12,fontSize:14,cursor:"pointer"}}>← 홈으로</button>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
